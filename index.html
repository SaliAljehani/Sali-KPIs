<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sali KPIs Dashboard</title>
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --border: #E4E2DA;
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --purple: #534AB7;
    --purple-light: #EEEDFE;
    --gray-light: #F1EFE8;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--teal-light);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; color: var(--teal);
    flex-shrink: 0;
  }
  .header-name { font-size: 15px; font-weight: 600; }
  .header-role { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .date-pill {
    background: var(--gray-light); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; color: var(--text-muted);
  }
  .refresh-btn {
    background: var(--teal-light); color: var(--teal);
    border: none; border-radius: 20px;
    padding: 5px 14px; font-size: 12px; cursor: pointer;
    font-weight: 500;
  }
  .refresh-btn:hover { background: #c5eadf; }

  /* TABS */
  .tabs {
    display: flex; gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    overflow-x: auto;
  }
  .tab {
    padding: 12px 20px;
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

  /* CONTENT */
  .content { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); margin-bottom: 14px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-title .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  /* STAT GRID */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--gray-light);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* GRID LAYOUTS */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }

  /* BADGE */
  .badge {
    display: inline-block; padding: 2px 9px;
    border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .b-green { background: #EAF3DE; color: #3B6D11; }
  .b-amber { background: var(--amber-light); color: var(--amber); }
  .b-red { background: var(--red-light); color: var(--red); }
  .b-teal { background: var(--teal-light); color: var(--teal); }
  .b-purple { background: var(--purple-light); color: var(--purple); }
  .b-gray { background: var(--gray-light); color: #5F5E5A; }

  /* PROGRESS BAR */
  .pbar-wrap { margin-top: 4px; }
  .pbar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .pbar-label { font-size: 12px; color: var(--text-muted); width: 100px; flex-shrink: 0; }
  .pbar-bg { flex: 1; height: 5px; background: var(--border); border-radius: 3px; }
  .pbar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .pbar-val { font-size: 11px; color: var(--text-muted); min-width: 32px; text-align: right; }

  /* KPI ROWS */
  .kpi-row {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .kpi-row:last-child { border-bottom: none; }
  .kpi-left { flex: 1; }
  .kpi-name { font-size: 13px; font-weight: 500; }
  .kpi-measure { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .kpi-weight { font-size: 11px; color: var(--text-muted); flex-shrink: 0; min-width: 32px; text-align: right; }

  /* CHECKLIST */
  .check-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item .freq { font-size: 10px; color: var(--text-muted); margin-left: auto; }
  .check-icon { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .check-icon.done { background: var(--teal-mid); border-color: var(--teal-mid); }
  .check-icon.done::after { content: '✓'; color: white; font-size: 10px; font-weight: 700; }

  /* WORK DONE TAGS */
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .work-tag {
    background: var(--teal-light);
    color: var(--teal);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* ATTENDANCE CALENDAR */
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
  .cal-day-name { font-size: 10px; color: var(--text-muted); text-align: center; padding: 3px 0; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-cell {
    height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    cursor: default;
  }
  .cal-empty { background: transparent; }
  .cal-office { background: var(--teal-light); color: var(--teal); }
  .cal-off { background: var(--gray-light); color: #888; }
  .cal-vacation { background: var(--amber-light); color: var(--amber); }
  .cal-sick { background: var(--red-light); color: var(--red); }
  .cal-remote { background: var(--purple-light); color: var(--purple); }
  .cal-future { background: #F7F6F2; color: #CCC; border: 1px dashed #E0DEDB; }

  .att-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .att-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .att-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* MONTH SELECTOR */
  .month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .month-nav button {
    background: var(--gray-light); border: none;
    border-radius: var(--radius-sm); padding: 5px 12px;
    cursor: pointer; font-size: 13px; color: var(--text);
  }
  .month-nav button:hover { background: var(--border); }
  .month-nav .month-label { font-size: 14px; font-weight: 600; min-width: 140px; text-align: center; }

  /* ATT STATS */
  .att-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .att-stat { padding: 10px 12px; border-radius: var(--radius-sm); }
  .att-stat .num { font-size: 22px; font-weight: 700; }
  .att-stat .lbl { font-size: 10px; margin-top: 2px; }

  /* INBOUND BRAND */
  .brand-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 14px; }

  /* SECTION DIVIDER */
  .section-sep { height: 1px; background: var(--border); margin: 16px 0; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .error-msg { background: var(--red-light); color: var(--red); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; margin-bottom: 12px; }

  @media (max-width: 600px) {
    .content { padding: 14px 12px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .header { padding: 10px 14px; }
    .tabs { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="avatar">SA</div>
    <div>
      <div class="header-name">Sali Aljehani</div>
      <div class="header-role">Team Lead · Inbound Contact Center · Petromin Group</div>
    </div>
  </div>
  <div class="header-right">
    <div class="date-pill" id="todayDate">—</div>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('inbound', this)">Inbound</div>
  <div class="tab" onclick="switchTab('workdone', this)">Work Done</div>
  <div class="tab" onclick="switchTab('kpis', this)">Sali KPIs</div>
  <div class="tab" onclick="switchTab('attendance', this)">Attendance</div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ===== INBOUND TAB ===== -->
  <div class="tab-panel active" id="tab-inbound">
    <div id="inbound-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- ===== WORK DONE TAB ===== -->
  <div class="tab-panel" id="tab-workdone">
    <div id="workdone-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- ===== KPIs TAB ===== -->
  <div class="tab-panel" id="tab-kpis">
    <div id="kpis-content"><div class="loading">Loading...</div></div>
  </div>

  <!-- ===== ATTENDANCE TAB ===== -->
  <div class="tab-panel" id="tab-attendance">
    <div id="attendance-content"><div class="loading">Loading...</div></div>
  </div>

</div>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbyccy-jbtVrbot1B1HQcaajny5hXL37cJFp46Hud24AgAMWpWHR2HymkMw51o_8TcmD/exec';

let attData = [], kpiData = [], inboundData = [];
let calMonth = new Date().getMonth();
let calYear = new Date().getFullYear();

// Today date
const today = new Date();
document.getElementById('todayDate').textContent = today.toLocaleDateString('en-GB', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

async function fetchSheet(sheetName) {
  const url = PROXY + '?sheet=' + encodeURIComponent(sheetName);
  const res = await fetch(url, {
    method: 'GET',
    redirect: 'follow',
    headers: { 'Content-Type': 'application/json' }
  });
  const text = await res.text();
  const json = JSON.parse(text);
  return json.data || [];
}

async function loadAll() {
  try {
    const [iData, kData, aData] = await Promise.all([
      fetchSheet('Inbound Work'),
      fetchSheet('Sali KPIs'),
      fetchSheet('Sali Attendance')
    ]);
    inboundData = iData;
    kpiData = kData;
    attData = aData;
    renderInbound(iData);
    renderWorkDone(iData);
    renderKPIs(kData);
    renderAttendance(aData);
  } catch(e) {
    console.error(e);
  }
}

// ===== INBOUND =====
function renderInbound(rows) {
  const dailyTasks = [], weeklyTasks = [], otherTasks = [];
  let inSection = false;
  rows.forEach(r => {
    const a = (r[0]||'').trim(), b = (r[1]||'').trim();
    if (a.includes('Daily Inbound Work')) { inSection = true; return; }
    if (a === 'Work Done') { inSection = false; return; }
    if (!inSection || !a) return;
    if (b === 'Daily') dailyTasks.push(a);
    else if (b === 'Weekly') weeklyTasks.push(a);
    else otherTasks.push({ name: a, freq: b || '' });
  });

  // Agent info
  let agentName = '', agentEmail = '';
  if (rows[1]) { agentName = rows[1][0]||''; agentEmail = rows[1][3]||''; }

  const todayKey = today.toLocaleDateString('en-US');
  const doneKey = 'inbound_done_' + todayKey;
  let doneSet = new Set(JSON.parse(localStorage.getItem(doneKey)||'[]'));

  function saveAndRe() {
    localStorage.setItem(doneKey, JSON.stringify([...doneSet]));
    renderInbound(rows);
  }

  const allDaily = dailyTasks.length;
  const doneToday = dailyTasks.filter(t => doneSet.has(t)).length;
  const pct = allDaily ? Math.round(doneToday/allDaily*100) : 0;

  let html = `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card">
        <div class="stat-num" style="color:var(--teal)">${doneToday}/${allDaily}</div>
        <div class="stat-label">Tasks done today</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${pct}%</div>
        <div class="stat-label">Daily progress</div>
        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:6px"><div style="height:100%;width:${pct}%;background:var(--teal-mid);border-radius:2px"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-num" style="color:var(--amber)">${weeklyTasks.length}</div>
        <div class="stat-label">Weekly tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${otherTasks.length}</div>
        <div class="stat-label">Other tasks</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><span class="dot" style="background:var(--teal-mid)"></span>Daily tasks — ${today.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</div>`;

  dailyTasks.forEach(t => {
    const isDone = doneSet.has(t);
    html += `<div class="check-item" onclick="toggleTask('${t.replace(/'/g,"\\'")}','${doneKey}')" style="cursor:pointer">
      <div class="check-icon ${isDone?'done':''}"></div>
      <span style="${isDone?'text-decoration:line-through;color:var(--text-muted)':''}">${t}</span>
      <span class="freq">Daily</span>
    </div>`;
  });
  html += `</div>

      <div>
        <div class="card" style="margin-bottom:12px">
          <div class="card-title"><span class="dot" style="background:var(--amber)"></span>Weekly tasks</div>`;
  weeklyTasks.forEach(t => {
    html += `<div class="check-item"><div class="check-icon"></div><span>${t}</span><span class="freq">Weekly</span></div>`;
  });
  html += `</div>
        <div class="card">
          <div class="card-title"><span class="dot" style="background:var(--purple)"></span>Other tasks</div>`;
  otherTasks.forEach(t => {
    html += `<div class="check-item"><div class="check-icon"></div><span>${t.name}</span><span class="freq">${t.freq}</span></div>`;
  });
  html += `</div></div></div>`;

  const el = document.getElementById('inbound-content');
  el.innerHTML = html;

  window.toggleTask = function(task, key) {
    if (doneSet.has(task)) doneSet.delete(task);
    else doneSet.add(task);
    localStorage.setItem(key, JSON.stringify([...doneSet]));
    renderInbound(rows);
  };
}

// ===== WORK DONE =====
function renderWorkDone(rows) {
  const items = [];
  let inSection = false;
  rows.forEach(r => {
    const a = (r[0]||'').trim();
    if (a === 'Work Done') { inSection = true; return; }
    if (!inSection || !a) return;
    items.push(a);
  });

  const html = `
    <div class="card" style="margin-bottom:14px">
      <div class="card-title"><span class="dot" style="background:var(--teal-mid)"></span>Achievements — 6 months (Jan – Jun 2026)</div>
      <div class="tags-wrap">
        ${items.map(i => `<span class="work-tag">${i}</span>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--purple)"></span>Summary</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" style="color:var(--teal)">${items.length}</div><div class="stat-label">Completed items</div></div>
        <div class="stat-card"><div class="stat-num">6</div><div class="stat-label">Months</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--teal)">Jan</div><div class="stat-label">Start date</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--amber)">Jun</div><div class="stat-label">Current month</div></div>
      </div>
    </div>`;
  document.getElementById('workdone-content').innerHTML = html;
}

// ===== KPIs =====
function renderKPIs(rows) {
  // Parse Inbound Performance section (rows 0-5 approx)
  const inboundPerf = [];
  const supervisorKPIs = [];
  let inInbound = false, inSupervisor = false;

  rows.forEach(r => {
    const a=(r[0]||'').trim(), b=(r[1]||'').trim(), c=(r[2]||'').trim();
    if (a === 'Inbound Performance' || a === 'Category' && b === 'KPIs Covered') { inInbound = true; return; }
    if (a === 'Category' && b === 'Measurement' && c === 'Weight') { inInbound = false; inSupervisor = true; return; }
    if (a === 'Final Total') { inSupervisor = false; return; }

    if (inInbound && a && b && c) {
      inboundPerf.push({ cat: a, kpis: b, weight: c });
    }
    if (inSupervisor && a && b && c) {
      supervisorKPIs.push({ cat: a, measure: b, weight: c });
    }
  });

  const statusColors = {
    'Team KPI Achievement': 'b-green',
    'QA Monitoring': 'b-green',
    'Inbound Booking Accuracy': 'b-amber',
    'Escalation Resolution': 'b-green',
    'Coaching Sessions': 'b-teal',
    'Improvement Plans': 'b-green',
    'Process Enhancement': 'b-gray',
    'Performance Gap Identification & Development Plan': 'b-green'
  };
  const statusText = {
    'Team KPI Achievement': '✓ On track',
    'QA Monitoring': '✓ On track',
    'Inbound Booking Accuracy': 'In progress',
    'Escalation Resolution': '✓ 96%',
    'Coaching Sessions': '14/18',
    'Improvement Plans': '✓ Done',
    'Process Enhancement': 'Pending',
    'Performance Gap Identification & Development Plan': '✓ Weekly'
  };

  let html = `
    <div class="section-label">Supervisor KPIs</div>
    <div class="card" style="margin-bottom:14px">
      <div class="card-title"><span class="dot" style="background:var(--teal-mid)"></span>Sali — supervisor performance indicators</div>`;

  supervisorKPIs.forEach(k => {
    const sc = statusColors[k.cat] || 'b-gray';
    const st = statusText[k.cat] || '—';
    html += `<div class="kpi-row">
      <div class="kpi-left">
        <div class="kpi-name">${k.cat}</div>
        <div class="kpi-measure">${k.measure}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
        <span class="badge ${sc}">${st}</span>
        <span class="kpi-weight">${k.weight}</span>
      </div>
    </div>`;
  });
  html += `</div>

    <div class="section-label">Inbound performance KPIs</div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--purple)"></span>Agent team — performance standards</div>`;

  const ipColors = ['var(--teal-mid)', 'var(--purple)', 'var(--amber)', '#1D9E75'];
  inboundPerf.forEach((k, i) => {
    const kpis = k.kpis.split('\n').filter(x => x.trim());
    html += `<div class="kpi-row">
      <div class="kpi-left">
        <div class="kpi-name">${k.cat}</div>
        <div class="kpi-measure">${kpis.map(x => '• ' + x.trim()).join('<br>')}</div>
      </div>
      <div style="flex-shrink:0">
        <span class="badge b-teal">${k.weight}</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('kpis-content').innerHTML = html;
}

// ===== ATTENDANCE =====
const MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function statusClass(s) {
  if (!s) return 'cal-future';
  s = s.toLowerCase();
  if (s === 'office') return 'cal-office';
  if (s === 'off') return 'cal-off';
  if (s.includes('vacation') || s.includes('vaction')) return 'cal-vacation';
  if (s.includes('sick')) return 'cal-sick';
  if (s.includes('work r') || s === 'work r') return 'cal-remote';
  return 'cal-off';
}

function renderAttendance(rows) {
  // Build map: "M/D/YYYY" -> status
  const map = {};
  rows.forEach(r => {
    if (!r[0] || !r[0].includes('/')) return;
    map[r[0].trim()] = (r[1]||'').trim();
  });

  renderCal(map);
}

function renderCal(map) {
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  // Stats for this month
  let office=0, vac=0, sick=0, off=0, remote=0;
  for (let d=1; d<=daysInMonth; d++) {
    const key = `${calMonth+1}/${d}/${calYear}`;
    const s = (map[key]||'').toLowerCase();
    if (s === 'office') office++;
    else if (s.includes('vacation')||s.includes('vaction')) vac++;
    else if (s.includes('sick')) sick++;
    else if (s.includes('work r')) remote++;
    else if (s === 'off') off++;
  }

  let html = `
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-label">${MONTHS_EN[calMonth]} ${calYear}</div>
      <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="att-stats">
      <div class="att-stat" style="background:var(--teal-light)">
        <div class="num" style="color:var(--teal)">${office}</div>
        <div class="lbl" style="color:var(--teal)">Office</div>
      </div>
      <div class="att-stat" style="background:var(--amber-light)">
        <div class="num" style="color:var(--amber)">${vac}</div>
        <div class="lbl" style="color:var(--amber)">Vacation</div>
      </div>
      <div class="att-stat" style="background:var(--purple-light)">
        <div class="num" style="color:var(--purple)">${remote}</div>
        <div class="lbl" style="color:var(--purple)">Remote</div>
      </div>
      <div class="att-stat" style="background:var(--red-light)">
        <div class="num" style="color:var(--red)">${sick}</div>
        <div class="lbl" style="color:var(--red)">Sick leave</div>
      </div>
      <div class="att-stat" style="background:var(--gray-light)">
        <div class="num" style="color:#888">${off}</div>
        <div class="lbl" style="color:#888">Day off</div>
      </div>
    </div>

    <div class="card">
      <div class="cal-header">
        ${DAYS_EN.map(d => `<div class="cal-day-name">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">
        ${Array(firstDay).fill('<div class="cal-cell cal-empty"></div>').join('')}`;

  for (let d=1; d<=daysInMonth; d++) {
    const key = `${calMonth+1}/${d}/${calYear}`;
    const status = map[key] || '';
    const cls = statusClass(status);
    const isToday = d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear();
    const todayStyle = isToday ? 'outline:2px solid var(--teal);outline-offset:1px;' : '';
    html += `<div class="cal-cell ${cls}" style="${todayStyle}" title="${status||'—'}">${d}</div>`;
  }

  html += `</div>
      <div class="att-legend">
        <div class="att-legend-item"><div class="att-dot" style="background:var(--teal-light)"></div>Office</div>
        <div class="att-legend-item"><div class="att-dot" style="background:var(--amber-light)"></div>Vacation</div>
        <div class="att-legend-item"><div class="att-dot" style="background:var(--purple-light)"></div>Remote</div>
        <div class="att-legend-item"><div class="att-dot" style="background:var(--red-light)"></div>Sick leave</div>
        <div class="att-legend-item"><div class="att-dot" style="background:var(--gray-light)"></div>Day off</div>
      </div>
    </div>`;

  document.getElementById('attendance-content').innerHTML = html;
  window.changeMonth = function(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCal(map);
  };
}

// INIT
loadAll();
</script>
</body>
</html>
